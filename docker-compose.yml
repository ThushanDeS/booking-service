version: '3.8'

services:
  booking-service:
    build: .
    container_name: booking-service
    ports:
      - "5002:5002"
    environment:
      - NODE_ENV=development
      - PORT=5002
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=booking_db
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - FLIGHT_SERVICE_URL=http://flight-catalog:5001
      - USER_SERVICE_URL=http://user-service:5004
      - PAYMENT_SERVICE_URL=http://payment-service:5003
    depends_on:
      - postgres
    volumes:
      - ./:/app
      - /app/node_modules
    networks:
      - flight-network

  postgres:
    image: postgres:15-alpine
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=booking_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - flight-network

volumes:
  postgres_data:

networks:
  flight-network:
    driver: bridge