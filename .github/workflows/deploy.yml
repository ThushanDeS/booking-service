name: Deploy Booking Service

on:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
      - run: npm ci
      - run: npm test

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      
      - name: Build and push Docker image
        run: |
          docker build -t booking-service:latest .
          docker tag booking-service:latest yourregistry.azurecr.io/booking-service:${{ github.sha }}
          docker push yourregistry.azurecr.io/booking-service:${{ github.sha }}
      
      - name: Deploy to Azure Container Apps
        run: |
          az containerapp update \
            --name booking-service \
            --resource-group flight-rg \
            --image yourregistry.azurecr.io/booking-service:${{ github.sha }}